<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DormLift - Campus Moving Helper</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <style>
        :root { --primary: #0066cc; --bg: #f4f7f6; --text: #333; --card-bg: #fff; --danger: #dc3545; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); }
        * { box-sizing: border-box; }
        
        /* Navbar */
        nav { background: var(--card-bg); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary); cursor: pointer; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text); font-weight: 500; cursor: pointer; transition: 0.2s; }
        .nav-links a:hover { color: var(--primary); }
        .btn { background: var(--primary); color: white !important; padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; }
        .btn:hover { background: #0052a3; }
        .btn-outline { background: transparent; color: var(--primary) !important; border: 1px solid var(--primary); }
        .btn-danger { background: white; color: var(--danger) !important; border: 1px solid var(--danger); }

        /* Container & Pages */
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Forms */
        .form-box { background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .flex-row { display: flex; gap: 10px; }
        .flex-row .form-group { flex: 1; }
        .code-group { display: flex; gap: 10px; }
        .code-group input { flex: 1; }
        
        /* Task Cards */
        .task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .task-card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid var(--primary); }
        .task-card h3 { margin-top: 0; color: var(--primary); display: flex; justify-content: space-between; }
        .task-card p { margin: 8px 0; font-size: 14px; }
        .address-box { background: #f8f9fa; padding: 10px; border-radius: 6px; margin: 10px 0; border: 1px dashed #ccc; }
        .badge { background: #e0f0ff; color: #0066cc; padding: 3px 8px; border-radius: 12px; font-size: 12px; }
        .badge.cancelled { background: #ffebee; color: #dc3545; }
        .badge.assigned { background: #e8f5e9; color: #28a745; }

        /* Profile */
        .profile-header { background: var(--card-bg); padding: 30px; border-radius: 12px; display: flex; gap: 20px; align-items: center; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .avatar { width: 80px; height: 80px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .info-item { font-size: 14px; }
        .info-item span { color: #666; display: block; font-size: 12px; text-transform: uppercase; margin-bottom: 2px;}
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="navigate('home')">DormLift</div>
        <div class="nav-links" id="nav-menu">
            </div>
    </nav>

    <div class="container">
        
        <div id="home" class="page active">
            <h2>🚚 Available Moving Tasks</h2>
            <div class="task-grid" id="public-tasks">
                <p>Loading tasks...</p>
            </div>
        </div>

        <div id="post-task" class="page">
            <div class="form-box" style="max-width: 700px;">
                <h2>Post a Moving Request</h2>
                
                <p style="font-size: 14px; color: #666; margin-bottom: 5px;">🗺️ Click on the map to automatically set <b>From</b> and <b>To</b> addresses:</p>
                <div id="map" style="height: 350px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ddd; z-index: 1;"></div>
                <p id="distance-display" style="color: #28a745; font-weight: bold; margin-top: 0; min-height: 20px;"></p>

                <form id="task-form">
                    <div class="flex-row">
                        <div class="form-group"><label>Date</label><input type="date" id="t_date" required></div>
                        <div class="form-group"><label>Time</label><input type="time" id="t_time" required></div>
                    </div>
                    <div class="form-group"><label>From Address 📍</label><input type="text" id="t_from" placeholder="Click map or type manually" required></div>
                    <div class="form-group"><label>To Address 🎯</label><input type="text" id="t_to" placeholder="Click map or type manually" required></div>
                    <div class="form-group"><label>Items Description</label><textarea id="t_items" rows="3" placeholder="e.g. 2 large boxes, 1 desk chair" required></textarea></div>
                    <div class="flex-row">
                        <div class="form-group"><label>People Needed</label><input type="number" id="t_people" min="1" value="1" required></div>
                        <div class="form-group"><label>Reward ($)</label><input type="text" id="t_reward" placeholder="e.g. $20 or Coffee" required></div>
                    </div>
                    <button type="submit" class="btn" style="width: 100%;">Publish Task</button>
                </form>
            </div>
        </div>

        <div id="profile" class="page">
            <div class="profile-header" id="profile-info">
                </div>
            
            <h3>My Published Tasks</h3>
            <div class="task-grid" id="my-published" style="margin-bottom: 30px;"></div>

            <h3>Tasks I Accepted</h3>
            <div class="task-grid" id="my-assigned"></div>
        </div>

        <div id="login" class="page">
            <div class="form-box" style="max-width: 500px;">
                <h2>Welcome Back</h2>
                <form id="login-form">
                    <div class="form-group"><label>Student ID</label><input type="text" id="l_id" required></div>
                    <div class="form-group"><label>Password</label><input type="password" id="l_pwd" required></div>
                    <button type="submit" class="btn" style="width: 100%;">Login</button>
                    <p style="text-align: center; margin-top: 15px; font-size: 14px;">Don't have an account? <a href="#" onclick="navigate('register')">Register here</a></p>
                </form>
            </div>
        </div>

        <div id="register" class="page">
            <div class="form-box" style="max-width: 600px;">
                <h2>Create Account</h2>
                <form id="reg-form">
                    <div class="flex-row">
                        <div class="form-group"><label>Student ID</label><input type="text" id="r_id" required></div>
                        <div class="form-group"><label>University / School</label><input type="text" id="r_school" placeholder="e.g. University of Auckland" required></div>
                    </div>
                    <div class="flex-row">
                        <div class="form-group"><label>First Name</label><input type="text" id="r_fname" required></div>
                        <div class="form-group"><label>Last Name</label><input type="text" id="r_lname" required></div>
                    </div>
                    <div class="flex-row">
                        <div class="form-group"><label>Anonymous Name</label><input type="text" id="r_anon" placeholder="Display name" required></div>
                        <div class="form-group">
                            <label>Gender</label>
                            <select id="r_gender" required>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group"><label>Phone Number</label><input type="text" id="r_phone" required></div>
                    <div class="form-group"><label>Email Address</label><input type="email" id="r_email" required></div>
                    <div class="form-group"><label>Password</label><input type="password" id="r_pwd" required></div>
                    
                    <div class="form-group">
                        <label>Verification Code</label>
                        <div class="code-group">
                            <input type="text" id="r_code" placeholder="6-digit code" required>
                            <button type="button" class="btn btn-outline" id="btn-code" onclick="sendCode()">Get Code</button>
                        </div>
                    </div>
                    <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Register</button>
                </form>
            </div>
        </div>

    </div>

    <script>
        const API = '/api';
        let currentUser = JSON.parse(localStorage.getItem('user')) || null;

        // ==========================================
        // UI & 导航逻辑
        // ==========================================
        function updateNav() {
            const nav = document.getElementById('nav-menu');
            if (currentUser) {
                // 已登录
                nav.innerHTML = `
                    <a onclick="navigate('home')">Home</a>
                    <a onclick="navigate('post-task')">Post Task</a>
                    <a onclick="navigate('profile')">My Profile</a>
                    <a onclick="logout()" class="btn">${currentUser.anonymous_name} (Logout)</a>
                `;
            } else {
                // 未登录 (全部展示，但引导登录)
                nav.innerHTML = `
                    <a onclick="navigate('home')">Home</a>
                    <a onclick="navigate('post-task')">Post Task</a>
                    <a onclick="navigate('login')">Login</a>
                    <a onclick="navigate('register')" class="btn">Register</a>
                `;
            }
        }

        function navigate(pageId) {
            // 核心拦截：未登录用户不能进入发布页
            if (pageId === 'post-task' && !currentUser) {
                alert('Please login first to post a task!');
                pageId = 'login';
            }

            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            if (pageId === 'home') loadTasks();
            if (pageId === 'profile' && currentUser) loadProfile();
            if (pageId === 'post-task') setTimeout(initMap, 200); // 延迟加载确保地图渲染正常
        }

        // ==========================================
        // 🗺️ 地图选点与距离计算逻辑
        // ==========================================
        let map = null, routingControl = null, markers = [];
        let currentRouteDistance = ""; 

        // 免费逆地址解析API (经纬度 -> 真实地址)
        async function getAddressFromCoords(lat, lng) {
            try {
                let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                let data = await res.json();
                return data.display_name || `Lat: ${lat.toFixed(4)}, Lng: ${lng.toFixed(4)}`;
            } catch (e) { return `Lat: ${lat.toFixed(4)}, Lng: ${lng.toFixed(4)}`; }
        }

        function initMap() {
            if (map) { map.invalidateSize(); return; }
            map = L.map('map').setView([-36.8509, 174.7645], 14); // 默认奥克兰
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

            map.on('click', async function(e) {
                if (markers.length >= 2) {
                    markers.forEach(m => map.removeLayer(m));
                    markers = [];
                    if (routingControl) map.removeControl(routingControl);
                    document.getElementById('distance-display').innerText = '';
                    currentRouteDistance = "";
                    document.getElementById('t_from').value = '';
                    document.getElementById('t_to').value = '';
                }

                let marker = L.marker(e.latlng).addTo(map);
                markers.push(marker);

                if (markers.length === 1) {
                    document.getElementById('distance-display').innerText = '⏳ Fetching street name for Start...';
                    let addr = await getAddressFromCoords(e.latlng.lat, e.latlng.lng);
                    document.getElementById('t_from').value = addr;
                    document.getElementById('distance-display').innerText = '📍 Start point set. Now click for Destination.';
                    document.getElementById('distance-display').style.color = '#0066cc';
                } else if (markers.length === 2) {
                    document.getElementById('distance-display').innerText = '⏳ Fetching street name and route...';
                    let addr = await getAddressFromCoords(e.latlng.lat, e.latlng.lng);
                    document.getElementById('t_to').value = addr;
                    
                    routingControl = L.Routing.control({
                        waypoints: [ markers[0].getLatLng(), markers[1].getLatLng() ],
                        routeWhileDragging: false, addWaypoints: false, show: false,
                        lineOptions: { styles: [{ color: '#0066cc', weight: 4 }] }
                    }).addTo(map);

                    routingControl.on('routesfound', function(e) {
                        let distKm = (e.routes[0].summary.totalDistance / 1000).toFixed(2);
                        currentRouteDistance = `${distKm} km`;
                        document.getElementById('distance-display').innerText = `🚗 Route Distance: ${currentRouteDistance}`;
                        document.getElementById('distance-display').style.color = '#28a745';
                    });
                }
            });
        }

        // ==========================================
        // 用户认证与业务逻辑
        // ==========================================
        async function sendCode() {
            const email = document.getElementById('r_email').value;
            if (!email) return alert('Please enter email first');
            const btn = document.getElementById('btn-code');
            btn.innerText = 'Sending...'; btn.disabled = true;
            try {
                const res = await fetch(`${API}/auth/send-code`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) });
                const data = await res.json();
                alert(data.message);
            } catch (e) { alert('Network error'); }
            btn.innerText = 'Get Code'; btn.disabled = false;
        }

        document.getElementById('reg-form').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch(`${API}/auth/register`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    student_id: document.getElementById('r_id').value, school_name: document.getElementById('r_school').value,
                    first_name: document.getElementById('r_fname').value, given_name: document.getElementById('r_lname').value,
                    anonymous_name: document.getElementById('r_anon').value, gender: document.getElementById('r_gender').value,
                    phone: document.getElementById('r_phone').value, email: document.getElementById('r_email').value,
                    password: document.getElementById('r_pwd').value, code: document.getElementById('r_code').value
                })
            });
            const data = await res.json();
            alert(data.message);
            if (data.success) navigate('login');
        };

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch(`${API}/auth/login`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ student_id: document.getElementById('l_id').value, password: document.getElementById('l_pwd').value })
            });
            const data = await res.json();
            if (data.success) {
                currentUser = data.user; localStorage.setItem('user', JSON.stringify(currentUser));
                updateNav(); navigate('home');
            } else { alert(data.message); }
        };

        function logout() { currentUser = null; localStorage.removeItem('user'); updateNav(); navigate('home'); }

        // ==========================================
        // 任务大厅与操作
        // ==========================================
        async function loadTasks() {
            const res = await fetch(`${API}/task/list`);
            const data = await res.json();
            const container = document.getElementById('public-tasks');
            if (!data.list || data.list.length === 0) { container.innerHTML = '<p>No tasks available right now.</p>'; return; }
            container.innerHTML = data.list.map(t => createTaskCard(t, 'public')).join('');
        }

        document.getElementById('task-form').onsubmit = async (e) => {
            e.preventDefault();
            if (!currentUser) return alert('Please login first');

            let finalToAddress = document.getElementById('t_to').value;
            if (currentRouteDistance) finalToAddress += ` (🚗 ${currentRouteDistance})`;

            const res = await fetch(`${API}/task/create`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    publisher_id: currentUser.student_id, move_date: document.getElementById('t_date').value,
                    move_time: document.getElementById('t_time').value, from_address: document.getElementById('t_from').value,
                    to_address: finalToAddress, items_desc: document.getElementById('t_items').value,
                    people_needed: document.getElementById('t_people').value, reward: document.getElementById('t_reward').value
                })
            });
            const data = await res.json();
            alert(data.message);
            if (data.success) { document.getElementById('task-form').reset(); currentRouteDistance=""; markers=[]; navigate('home'); }
        };

        async function acceptTask(taskId) {
            if (!currentUser) return alert('Please login first');
            const res = await fetch(`${API}/task/apply`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ task_id: taskId, helper_id: currentUser.student_id }) });
            const data = await res.json();
            alert(data.message); loadTasks();
        }

        async function cancelTask(taskId) {
            if (!confirm('Are you sure you want to cancel this task?')) return;
            const res = await fetch(`${API}/task/cancel`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ task_id: taskId }) });
            const data = await res.json();
            alert(data.message); loadProfile(); 
        }

        // ==========================================
        // 个人中心逻辑
        // ==========================================
        async function loadProfile() {
            const resUser = await fetch(`${API}/user/profile`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ student_id: currentUser.student_id }) });
            const dataUser = await resUser.json();
            if(dataUser.success) currentUser = dataUser.user;

            document.getElementById('profile-info').innerHTML = `
                <div class="avatar">${currentUser.anonymous_name.charAt(0).toUpperCase()}</div>
                <div style="flex:1;">
                    <h2 style="margin:0 0 15px 0;">${currentUser.anonymous_name} <span class="badge" style="font-size:14px; font-weight:normal;">ID: ${currentUser.student_id}</span></h2>
                    <div class="info-grid">
                        <div class="info-item"><span>University</span><b>${currentUser.school_name || 'N/A'}</b></div>
                        <div class="info-item"><span>Real Name</span><b>${currentUser.first_name} ${currentUser.given_name}</b></div>
                        <div class="info-item"><span>Email</span><b>${currentUser.email}</b></div>
                        <div class="info-item"><span>Phone</span><b>${currentUser.phone}</b></div>
                        <div class="info-item"><span>Gender</span><b style="text-transform:capitalize;">${currentUser.gender}</b></div>
                        <div class="info-item"><span>Joined</span><b>${new Date(currentUser.created_at).toLocaleDateString()}</b></div>
                    </div>
                </div>
            `;

            const resPub = await fetch(`${API}/task/my-published`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ student_id: currentUser.student_id }) });
            const dataPub = await resPub.json();
            document.getElementById('my-published').innerHTML = dataPub.list.length ? dataPub.list.map(t => createTaskCard(t, 'published')).join('') : '<p>You haven\'t published any tasks.</p>';

            const resAss = await fetch(`${API}/task/my-assigned`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ student_id: currentUser.student_id }) });
            const dataAss = await resAss.json();
            document.getElementById('my-assigned').innerHTML = dataAss.list.length ? dataAss.list.map(t => createTaskCard(t, 'assigned')).join('') : '<p>You haven\'t accepted any tasks.</p>';
        }

        // ==========================================
        // 统一卡片渲染组件
        // ==========================================
        function createTaskCard(task, viewType) {
            let actionBtn = '';
            let badgeClass = task.status === 'cancelled' ? 'cancelled' : (task.status === 'assigned' ? 'assigned' : '');

            if (viewType === 'public') {
                if (currentUser && currentUser.student_id !== task.publisher_id) {
                    actionBtn = `<button class="btn" onclick="acceptTask(${task.id})" style="width:100%; margin-top:10px;">Accept Task</button>`;
                } else if (!currentUser) {
                    actionBtn = `<button class="btn btn-outline" onclick="navigate('login')" style="width:100%; margin-top:10px;">Login to Accept</button>`;
                }
            } else if (viewType === 'published' && task.status === 'pending') {
                actionBtn = `<button class="btn btn-danger" onclick="cancelTask(${task.id})" style="width:100%; margin-top:10px;">Cancel Task</button>`;
            }

            return `
                <div class="task-card">
                    <h3>Moving Request <span class="badge ${badgeClass}">${task.status}</span></h3>
                    <p>📅 <b>${task.move_date}</b> at <b>${task.move_time}</b></p>
                    <div class="address-box">
                        <p style="margin-top:0;">📍 From: <br><b>${task.from_address}</b></p>
                        <p style="margin-bottom:0; margin-top:10px;">🎯 To: <br><b>${task.to_address}</b></p>
                    </div>
                    <p>📦 <b>Items:</b> ${task.items_desc}</p>
                    <p>🧑‍🤝‍🧑 <b>Helpers Needed:</b> ${task.people_needed}</p>
                    <p>💰 <b>Reward:</b> <span style="color:#28a745; font-weight:bold;">${task.reward}</span></p>
                    ${task.publisher_name ? `<p style="font-size:12px; color:#888;">Publisher: ${task.publisher_name}</p>` : ''}
                    ${actionBtn}
                </div>
            `;
        }

        // 页面初始化
        updateNav(); navigate('home');
    </script>
</body>
</html>
